name: Node.js CD (Auto Deploy)

on:
  push:
    branches: [ "main" ] # Hoặc "master" tùy repo của bạn

jobs:
  deploy:
    runs-on: self-hosted # Chạy trên cái Runner bạn vừa cài

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install dependencies
      run: npm install

    - name: Restart PM2
      run: pm2 restart websv || pm2 start webserver.js --name "websv"